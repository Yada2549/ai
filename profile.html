<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Page</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo"><span class="logo-placeholder">LOGO</span></div>
    <div class="nav-buttons">
      <button class="home-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9.5L12 3l9 6.5V21a1 1 0 0 1-1 1h-6v-7H10v7H4a1 1 0 0 1-1-1V9.5z"/>
        </svg> Home
      </button>
      <button class="desc-btn">Description</button>
      <button class="logout-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg> Log-Out
      </button>
    </div>
  </div>
  <div class="header-bottom">
    <span class="status-text">Ready to inspect work...</span>
    <button class="lang-btn" onclick="toggleLanguage()">EN/TH</button>
  </div>
</header>

<div class="profile-container">
  <div class="profile-circle" id="profile-avatar">
    <img id="profile-img" class="avatar-image" src="" alt="Profile">
    <svg class="avatar-placeholder" viewBox="0 0 24 24" fill="none" stroke="#b084ff" stroke-width="2">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 21v-2a6 6 0 0 1 12 0v2"/>
    </svg>
  </div>

  <h2 id="profile-name">username 1</h2>

  <div class="history-section">
    <h3 id="history-title">History...</h3>
    <div id="history-list">
      <div class="history-item template" style="display:none;">
        <div class="file-info">
          <div class="file-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a75cff" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </div>
          <div class="file-name">Example File</div>
        </div>
        <div class="file-date">DD/MM/YY</div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
